<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #050505; /* خلفية سوداء داكنة جداً */
            color: #00ff00; /* أخضر نيون */
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-box {
            border: 2px solid #00ff00;
            padding: 30px;
            width: 500px;
            box-shadow: 0 0 15px #00ff00; /* توهج الإطار */
            text-align: center;
        }

        h1 {
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .discord-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            transition: 0.3s;
        }

        .discord-btn:hover {
            background: #00ff00;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>Fucked by 187 </h1>
        <p>Buy a Security Mother Fucker 😒</p>
        <p>fuck@system-5 why?</p>
        <br>
        <div class="discord-btn">discord.gg/Vomes</div>
    </div>

    <audio id="sound" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <script>
        document.body.onclick = () => document.getElementById('sound').play();
    </script>
</body>
</html>
